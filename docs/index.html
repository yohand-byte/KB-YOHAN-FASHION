<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {

    --bg-secondary: #111118;
    --bg-card: #16161f;
    --bg-card-hover: #1c1c28;
    --gold: #d4a853;
    --gold-light: #e8c97a;
    --gold-dark: #b08930;
    --coral: #e8734a;
    --coral-light: #ff9472;
    --green: #4ecdc4;
    --green-dark: #2ab8ad;
    --red: #ff6b6b;
    --text-primary: #f0ece4;
    --text-secondary: #9994a8;
    --text-muted: #6b6580;
    --border: rgba(212, 168, 83, 0.15);
    --glow-gold: rgba(212, 168, 83, 0.3);

  html, body, #root {
    height: 100%; width: 100%; overflow: hidden;
    font-family: 'Heebo', sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    direction: rtl;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInRight {
    from { opacity: 0; transform: translateX(60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeInLeft {
    from { opacity: 0; transform: translateX(-60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }

  @keyframes borderGlow {
    0%, 100% { border-color: rgba(212, 168, 83, 0.2); }

  @keyframes slideInFromRight {
    from { opacity:0; transform: translateX(100px); }
    to { opacity:1; transform: translateX(0); }
  }
  @keyframes growWidth {
    from { width: 0%; }
  }
  @keyframes popIn {
    0% { opacity:0; transform: scale(0.3); }
    70% { transform: scale(1.1); }
    100% { opacity:1; transform: scale(1); }

    border-radius: 0 8px 8px 0;
    transition: width 1s ease-out;
    position: relative;

  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; }

  .carousel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dark) var(--bg-secondary);

  .metric-badge {

@keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
@keyframes floatUp { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }

// ========== ANIMATED NUMBER COMPONENT ==========
function AnimatedNumber({ value, duration = 2000, prefix = '', suffix = '', decimals = 0 }) {
  const [display, setDisplay] = useState(0);
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    setVisible(true);
    let start = 0;
    const startTime = Date.now();
    const tick = () => {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(eased * value);
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [value, duration]);

  return <span>{prefix}{decimals > 0 ? display.toFixed(decimals) : formatNIS(Math.round(display))}{suffix}</span>;
}

// ========== MAIN APP ==========
function App() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const [direction, setDirection] = useState(0);
  const [isTransitioning, setIsTransitioning] = useState(false);

  const slides = [
    TitleSlide, ExecutiveSummarySlide, NetworkGrowthSlide, RevenueBreakdownSlide,
    SameStoreSlide, PodiumSlide, NewStoresSlide, EcommerceSlide,
    StoreCardsSlide, PerformanceSlide, ChallengesSlide, ThankYouSlide
  ];

  const navigate = useCallback((target) => {
    if (isTransitioning) return;
    if (typeof target === 'number' && target >= 0 && target < slides.length && target !== currentSlide) {
      setDirection(target > currentSlide ? 1 : -1);
      setIsTransitioning(true);
      setTimeout(() => {
        setCurrentSlide(target);
        setIsTransitioning(false);
      }, 100);
    }
  }, [currentSlide, isTransitioning, slides.length]);

  const goNext = useCallback(() => navigate(currentSlide + 1), [currentSlide, navigate]);
  const goPrev = useCallback(() => navigate(currentSlide - 1), [currentSlide, navigate]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { e.preventDefault(); goPrev(); }
      if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [goNext, goPrev]);

  const SlideComponent = slides[currentSlide];

  return (
    <div style={{ width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden', background: 'var(--bg-primary)' }}>
      {/* Slide counter */}
      <div style={{ position: 'fixed', top: 20, left: 24, zIndex: 100, fontSize: 13, color: 'var(--text-muted)',
                    padding: '4px 12px', background: 'rgba(10,10,15,0.7)', borderRadius: 8, backdropFilter: 'blur(8px)',
                    border: '1px solid var(--border)' }}>
        {currentSlide + 1} / {slides.length}
      </div>

      {/* Fullscreen button */}
      <div onClick={() => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }}
           style={{ position: 'fixed', top: 20, right: 24, zIndex: 100, cursor: 'pointer', fontSize: 13, color: 'var(--text-muted)',
                    padding: '4px 12px', background: 'rgba(10,10,15,0.7)', borderRadius: 8, backdropFilter: 'blur(8px)',
                    border: '1px solid var(--border)', transition: 'color 0.2s' }}
           onMouseEnter={e => e.target.style.color = 'var(--gold)'}
           onMouseLeave={e => e.target.style.color = 'var(--text-muted)'}>
        [F] מסך מלא
      </div>

      {/* Main slide */}
      <div key={currentSlide} style={{
        opacity: isTransitioning ? 0 : 1,
        transform: isTransitioning ? `translateX(${direction * 40}px)` : 'translateX(0)',
        transition: 'opacity 0.4s ease, transform 0.4s ease',
        position: 'absolute', inset: 0
      }}>
        <SlideComponent />
      </div>

      {/* Click zones for navigation */}
      <div onClick={goNext} style={{ position: 'fixed', left: 0, top: 0, width: '15%', height: '100%', cursor: 'pointer', zIndex: 50 }} />
      <div onClick={goPrev} style={{ position: 'fixed', right: 0, top: 0, width: '15%', height: '100%', cursor: 'pointer', zIndex: 50 }} />

      <SlideIndicator current={currentSlide} total={slides.length} onNavigate={navigate} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
